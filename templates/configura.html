<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Configura Clienti</title>
</head>
<body>
<div style="margin-bottom:20px;">
    <a href="{{ url_for('index') }}">Home</a> |
    <a href="{{ url_for('planning') }}">Planning</a> |
    <a href="{{ url_for('configura') }}">Configura</a>
</div>

<h1>Configurazione frequenza clienti</h1>

<form method="post">
    <h2>Cliente esistente</h2>
    <label>Cliente:</label>
    <select name="cliente" id="cliente">
        {% for cliente in clienti %}
            <option value="{{ cliente }}">{{ cliente }}</option>
        {% endfor %}
    </select>

    <hr>

    <h2>Oppure aggiungi un nuovo cliente</h2>

    <label>Nome nuovo cliente:</label>
    <input type="text" name="nuovo_cliente" id="nuovo_cliente">

    <br><br>

    <label>Divisione:</label>
    <input type="text" name="divisione" id="divisione">

    <br><br>

    <label>Nazione:</label>
    <input type="text" name="nazione" id="nazione">

    <br><br>

    <label>Referente:</label>
    <select name="referente" id="referente">
        <option value="">-- Seleziona --</option>
        <option value="Simone">Simone</option>
        <option value="Luca">Luca</option>
    </select>

    <hr>

    <label>Ogni quanto:</label>
    <input type="number" name="valore" id="valore" required>

    <select name="unita" id="unita">
        <option value="settimane">Settimane</option>
        <option value="mesi">Mesi</option>
    </select>

    <br><br>

    <button type="submit">Salva</button>
</form>

<hr>

<h2>Configurazioni attuali</h2>

<ul>
    {% for c in clienti_config %}
        <li>
            {{ c.cliente }} → ogni {{ c.frequenza_valore }} {{ c.frequenza_unita }}
        </li>
    {% endfor %}
</ul>

<script>
    const configClienti = JSON.parse('{{ clienti_config | tojson | safe }}');

    const clienteSelect = document.getElementById("cliente");
    const valoreInput = document.getElementById("valore");
    const unitaSelect = document.getElementById("unita");
    const nuovoClienteInput = document.getElementById("nuovo_cliente");

    function aggiornaCampi() {
        if (nuovoClienteInput.value.trim() !== "") {
            valoreInput.value = "";
            unitaSelect.value = "settimane";
            return;
        }

        const clienteSelezionato = clienteSelect.value;
        const config = configClienti.find(c => c.cliente === clienteSelezionato);

        if (config) {
            valoreInput.value = config.frequenza_valore;
            unitaSelect.value = config.frequenza_unita;
        } else {
            valoreInput.value = "";
            unitaSelect.value = "settimane";
        }
    }

    clienteSelect.addEventListener("change", aggiornaCampi);
    nuovoClienteInput.addEventListener("input", aggiornaCampi);

    aggiornaCampi();
</script>

</body>
</html>
